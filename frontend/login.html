<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | OCMS</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <div class="auth-wrapper">
    <div class="auth-blob auth-blob-1"></div>
    <div class="auth-blob auth-blob-2"></div>

    <div class="auth-card glass glass-panel">
      <div class="text-center mb-8">
        <h1 class="text-gradient mb-2" style="font-size: 2.5rem;">OCMS</h1>
        <p>Unlock Your Learning Potential</p>
      </div>

      <form id="loginForm">
        <div class="form-group">
          <label class="form-label" for="email">Email Address</label>
          <input type="email" id="email" class="form-control" placeholder="you@example.com" required>
        </div>

        <div class="form-group mb-8">
          <label class="form-label" for="password">Password</label>
          <input type="password" id="password" class="form-control" placeholder="••••••••" required>
        </div>

        <button type="submit" id="loginBtn" class="btn btn-primary w-full" style="padding: 14px; font-size: 1rem;">
          Sign In
        </button>
      </form>

      <div class="mt-8 text-center text-muted" style="font-size: 0.9rem;">
        <p>Don't have an account? <a href="register.html" style="color:var(--secondary);font-weight:600">Register
            Here</a></p>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>

</html>
