<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Detail | OCMS</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .course-layout {
            display: grid;
            grid-template-columns: 320px 1fr;
            height: 100vh;
            overflow: hidden;
        }

        .modules-sidebar {
            background: var(--bg-card);
            backdrop-filter: blur(12px);
            border-right: var(--glass-border);
            padding: 24px;
            overflow-y: auto;
        }

        .lectures-view {
            padding: 40px;
            overflow-y: auto;
        }
    </style>
</head>

<body>

    <div class="course-layout">
        <aside class="modules-sidebar">
            <div class="mb-4">
                <a href="dashboard.html" class="flex gap-2 items-center text-muted mb-4" style="font-size:0.9rem">
                    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M19 12H5M12 19l-7-7 7-7" />
                    </svg> Back
                </a>
                <h2 id="courseTitle" class="text-gradient">Course View</h2>
            </div>

            <button id="viewCourseReviewsBtn" class="btn w-full mb-6 glass"
                style="border: 1px solid var(--accent); transition: 0.3s; justify-content: flex-start; gap: 8px;">
                <span style="font-size:1.2rem">⭐</span> Course Reviews
            </button>
            <hr style="border-color: var(--glass-border); margin-bottom: 24px;">

            <p class="text-muted mb-4"
                style="font-size:0.85rem; font-weight:600; text-transform:uppercase; letter-spacing:1px;">Modules</p>
            <div id="courseModules">
                <!-- Injected via app.js -->
            </div>
        </aside>

        <main class="lectures-view">
            <div id="lecturesArea">
                <div class="glass glass-panel text-center">
                    <h3>Loading course material...</h3>
                    <div class="spinner mt-4"
                        style="margin: 0 auto; border-color:var(--primary); border-top-color:transparent;"></div>
                </div>
            </div>
        </main>
    </div>

    <script src="js/app.js"></script>
</body>

</html>
