<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Courses | OCMS</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <body>

        <div class="page-wrapper">
            <!-- Sidebar Navigation -->
            <aside class="sidebar glass" style="border-radius:0;">
                <div class="sidebar-logo text-gradient mb-8">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="url(#grad1)" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" />
                        <defs>
                            <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
                                <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
                                <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
                            </linearGradient>
                        </defs>
                    </svg>
                    OCMS Platform
                </div>

                <nav class="nav-links">
                    <li class="nav-item"><a href="dashboard.html">
                            <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
                                <rect x="3" y="3" w="18" h="18" rx="2" ry="2"></rect>
                            </svg> Dashboard</a>
                    </li>
                    <li class="nav-item active"><a href="my-courses.html">
                            <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>
                                <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>
                            </svg> My Courses</a>
                    </li>
                    <li class="nav-item"><a href="profile.html">
                            <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                                <circle cx="12" cy="7" r="4"></circle>
                            </svg> Profile Settings</a>
                    </li>
                </nav>

                <div class="mt-8">
                    <button class="btn btn-outline w-full logout-btn">
                        Log Out
                    </button>
                </div>
            </aside>

            <!-- Main Content Area -->
            <main class="main-content">
                <div class="header" style="margin-bottom:24px;">
                    <div>
                        <h1 class="text-gradient">My Learning Path</h1>
                        <p>Resume your enrolled courses.</p>
                    </div>
                </div>

                <div class="mb-8 flex gap-4">
                    <button class="btn btn-primary filter-btn" data-filter="">All</button>
                    <button class="btn glass filter-btn" data-filter="enrolled">Active</button>
                    <button class="btn glass filter-btn" data-filter="completed">Completed</button>
                </div>

                <div id="myCoursesList" class="grid grid-cols-2">
                    <!-- Injected via app.js -->
                </div>
            </main>
        </div>

        <script src="js/app.js"></script>
    </body>

</html>
