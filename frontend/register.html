<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | OCMS</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="auth-wrapper">
        <div class="auth-blob auth-blob-1"></div>
        <div class="auth-blob auth-blob-2"></div>

        <div class="auth-card glass glass-panel">
            <div class="text-center mb-8">
                <h1 class="text-gradient mb-2" style="font-size: 2.5rem;">Join OCMS</h1>
                <p>Start Your Learning Journey Today</p>
            </div>

            <form id="registerForm">
                <div class="form-group">
                    <label class="form-label" for="regName">Full Name</label>
                    <input type="text" id="regName" class="form-control" placeholder="John Doe" required>
                </div>

                <div class="form-group">
                    <label class="form-label" for="regEmail">Email Address</label>
                    <input type="email" id="regEmail" class="form-control" placeholder="you@example.com" required>
                </div>

                <div class="form-group mb-8">
                    <label class="form-label" for="regPassword">Password</label>
                    <input type="password" id="regPassword" class="form-control" placeholder="••••••••" required
                        minlength="6">
                </div>

                <button type="submit" id="registerBtn" class="btn btn-primary w-full"
                    style="padding: 14px; font-size: 1rem;">
                    Create Account
                </button>
            </form>

            <div class="mt-8 text-center text-muted" style="font-size: 0.9rem;">
                <p>Already have an account? <a href="login.html" style="color:var(--primary);font-weight:600">Sign In
                        instead</a></p>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>

</html>
